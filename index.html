<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة زين العابدين المحبشي | يمن تمكين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #00d2ff; --bg: #050505; --card: #121212; --text: #ffffff; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-top: 80px; }
        header { position: fixed; top: 0; width: 100%; z-index: 2000; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); padding: 15px 0; border-bottom: 2px solid var(--primary); text-align: center; cursor: pointer; }
        .container { max-width: 800px; margin: 0 auto; padding: 0 15px; }

        /* مساحات الإعلانات */
        .ad-slot { background: #0f0f0f; border: 1px dashed #444; margin: 20px 0; min-height: 100px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #777; border-radius: 12px; overflow: hidden; }

        /* زر الذكاء الاصطناعي */
        .ai-gold-btn { background: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728); color: #000 !important; padding: 15px; border-radius: 12px; text-align: center; font-weight: 900; margin-bottom: 20px; display: block; text-decoration: none; box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3); }
        
        /* كروت المقالات */
        .post-card { background: var(--card); border-radius: 20px; overflow: hidden; margin-bottom: 30px; border: 1px solid #222; }
        .post-img { width: 100%; height: 230px; object-fit: cover; }
        .post-info { padding: 20px; }
        .meta { color: var(--primary); font-size: 12px; margin-bottom: 10px; display: flex; gap: 15px; }
        
        .read-more-btn { display: inline-block; margin-top: 15px; background: var(--primary); color: #000; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; }
        
        /* واجهة المقال المنفرد */
        #article-view { display: none; animation: fadeIn 0.4s; padding-bottom: 60px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .full-img { width: 100%; border-radius: 20px; margin: 15px 0; border: 1px solid #333; }
        .content-text { font-size: 19px; line-height: 2.1; color: #ddd; white-space: pre-line; text-align: justify; }
        
        .back-btn { background: #333; color: var(--primary); padding: 14px; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 40px; font-weight: bold; cursor: pointer; border: 1px solid var(--primary); }
    </style>
</head>
<body>

<header onclick="showHome()">
    <div style="font-family:'Cairo'; font-size: 24px;">منصة زين العابدين المحبشي</div>
    <div style="color:var(--primary); font-size: 13px; font-weight: bold;">يمن تمكين الرقمية</div>
</header>

<div class="container">
    <div id="home-page">
        <a href="https://chatgpt.com" target="_blank" class="ai-gold-btn">
            <i class="fas fa-robot"></i> استشر الذكاء الاصطناعي الآن
        </a>

        <div class="ad-slot">إعلان القائمة الرئيسية (Banner)</div>

        <div id="posts-list"></div>
    </div>

    <div id="article-view">
        <h1 id="f-title" style="font-family:'Cairo'; color:var(--primary); font-size: 28px; line-height: 1.4;"></h1>
        <div id="f-meta" class="meta"></div>

        <div class="ad-slot">إعلان تحت العنوان (اقرأ المزيد)</div>

        <img id="f-img" class="full-img">

        <div class="ad-slot">إعلان وسط المقال</div>

        <div id="f-content" class="content-text"></div>

        <div class="ad-slot" style="min-height: 200px;">إعلان نهاية المقال (Native Ads)</div>
        
        <div class="back-btn" onclick="showHome()">
            <i class="fas fa-home"></i> العودة للقائمة الرئيسية
        </div>
    </div>
</div>

<script>
    let articles = [];

    async function fetchData() {
        try {
            const res = await fetch('data.json?v=' + Date.now());
            articles = await res.json();
            articles.reverse(); // لظهور الأحدث أولاً
            render();
        } catch (e) {
            document.getElementById('posts-list').innerHTML = "<p style='text-align:center;'>يرجى رفع ملف data.json</p>";
        }
    }

    function render() {
        const list = document.getElementById('posts-list');
        list.innerHTML = '';
        articles.forEach((post, i) => {
            list.innerHTML += `
                <div class="post-card">
                    <img src="${post.image}" class="post-img">
                    <div class="post-info">
                        <div class="meta">
                            <span><i class="far fa-calendar-alt"></i> ${post.date}</span>
                            <span><i class="far fa-clock"></i> ${post.time || ''}</span>
                        </div>
                        <h2 style="font-family:'Cairo'; font-size:22px; margin:0;">${post.title}</h2>
                        <div class="read-more-btn" onclick="openPost(${i})">إقرأ المزيد</div>
                    </div>
                </div>`;
        });
    }

    function openPost(idx) {
        document.getElementById('home-page').style.display = 'none';
        document.getElementById('article-view').style.display = 'block';
        const p = articles[idx];
        document.getElementById('f-title').innerText = p.title;
        document.getElementById('f-meta').innerHTML = `<span><i class="far fa-calendar-alt"></i> ${p.date}</span> <span><i class="far fa-clock"></i> ${p.time || ''}</span>`;
        document.getElementById('f-img').src = p.image;
        document.getElementById('f-content').innerText = p.content;
        window.scrollTo(0,0);
    }

    function showHome() {
        document.getElementById('home-page').style.display = 'block';
        document.getElementById('article-view').style.display = 'none';
        window.scrollTo(0,0);
    }

    fetchData();
</script>
</body>
</html>
