<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة زين العابدين المحبشي | يمن تمكين</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Tajawal:wght@400;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #00d2ff;
            --accent: #9d50bb;
            --dark-bg: #050505;
            --glass: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, #1a1a2e, #050505);
            display: flex;
            flex-direction: column;
        }

        /* الهيدر والشعار */
        header {
            padding: 50px 20px 30px;
            text-align: center;
        }

        .logo-box {
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
            position: relative;
        }

        .logo-box i { font-size: 55px; color: var(--primary); }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }

        .title { font-family: 'Cairo', sans-serif; font-size: 26px; font-weight: 900; }
        .tagline { color: var(--primary); font-size: 14px; margin-top: 8px; letter-spacing: 1px; }

        /* شريط التواصل الاجتماعي */
        .social-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 25px 0;
        }

        .s-link {
            width: 42px; height: 42px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; text-decoration: none; font-size: 18px;
            transition: 0.3s; border: 1px solid rgba(255,255,255,0.1);
        }

        .fb { background: #1877F2; }
        .wa { background: #25D366; }
        .ig { background: #E4405F; }
        .x  { background: #000; }
        .s-link:hover { transform: scale(1.15); box-shadow: 0 0 15px white; }

        /* الحاوية والأزرار */
        .container { max-width: 450px; margin: 0 auto; padding: 0 20px; width: 100%; }

        .menu-item {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 22px;
            border-radius: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: 0.4s;
            backdrop-filter: blur(10px);
        }

        .menu-item:hover {
            background: rgba(255,255,255,0.15);
            border-color: var(--primary);
            transform: translateX(-5px);
        }

        .menu-item i:first-child { width: 45px; font-size: 24px; color: var(--primary); }
        .menu-item span { flex-grow: 1; font-weight: 800; font-size: 17px; }

        /* مساحات الإعلانات */
        .ad-unit {
            background: rgba(0,0,0,0.6);
            border: 1px dashed #333;
            border-radius: 12px;
            margin: 25px 0;
            padding: 15px;
            text-align: center;
            font-size: 12px;
            color: #555;
        }

        /* زر الذكاء الاصطناعي العائم المربوط بجوجل */
        .ai-float {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 65px;
            height: 65px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px var(--primary);
            cursor: pointer;
            z-index: 9999;
            text-decoration: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 210, 255, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(0, 210, 255, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 210, 255, 0); }
        }

        footer {
            margin-top: auto;
            padding: 40px 20px;
            text-align: center;
            font-size: 11px;
            color: #444;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .visitor-count { color: var(--primary); margin-top: 10px; font-weight: bold; }

    </style>
</head>
<body>

    <header>
        <div class="logo-box">
            <i class="fas fa-microchip"></i>
        </div>
        <h1 class="title">زين العابدين المحبشي</h1>
        <p class="tagline">يمن تمكين | مستقبل التكنولوجيا والمجتمع</p>

        <div class="social-bar">
            <a href="https://facebook.com/YOUR_FB_ID" class="s-link fb"><i class="fab fa-facebook-f"></i></a>
            <a href="https://wa.me/967XXXXXXXXX" class="s-link wa"><i class="fab fa-whatsapp"></i></a>
            <a href="https://instagram.com/YOUR_IG" class="s-link ig"><i class="fab fa-instagram"></i></a>
            <a href="https://twitter.com/YOUR_X" class="s-link x"><i class="fab fa-x-twitter"></i></a>
        </div>
    </header>

    <div class="container">
        
        <div class="ad-unit">
            <p>ADVERTISEMENT</p>
            </div>

        <a href="#" class="menu-item">
            <i class="fas fa-shield-alt"></i>
            <span>أخبار سياسية</span>
            <i class="fas fa-angle-left"></i>
        </a>

        <a href="#" class="menu-item">
            <i class="fas fa-laptop-code"></i>
            <span>أخبار تكنولوجية</span>
            <i class="fas fa-angle-left"></i>
        </a>

        <a href="#" class="menu-item">
            <i class="fas fa-globe-asia"></i>
            <span>قضايا عامة</span>
            <i class="fas fa-angle-left"></i>
        </a>

        <div class="ad-unit">
            <p>SPONSORED CONTENT</p>
            </div>

    </div>

    <a href="https://gemini.google.com/" target="_blank" class="ai-float">
        <i class="fas fa-robot" style="color: white; font-size: 28px;"></i>
    </a>

    <footer>
        <p>جميع الحقوق محفوظة © 2026 - زين العابدين المحبشي</p>
        <p class="visitor-count"><i class="fas fa-bolt"></i> جاري الاتصال بنظام يمن تمكين الذكي...</p>
    </footer>

</body>
</html>
