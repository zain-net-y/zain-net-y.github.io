
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة زين العابدين المحبشي | يمن تمكين</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #00d2ff; --bg: #0a0a0a; --card: #161616; --text: #eeeeee; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        header { padding: 40px 20px; text-align: center; background: #000; border-bottom: 2px solid var(--primary); }
        .logo-text { font-family: 'Cairo', sans-serif; font-size: 24px; margin: 0; }
        .sub-text { color: var(--primary); font-size: 14px; margin-top: 5px; }

        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }

        /* مكان الإعلانات */
        .ad-space { background: #111; margin: 20px 0; text-align: center; border: 1px dashed #333; border-radius: 10px; min-height: 90px; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* كروت المقالات */
        .post-card { background: var(--card); border-radius: 15px; overflow: hidden; margin-bottom: 25px; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .post-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .post-img { width: 100%; height: 220px; object-fit: cover; }
        .post-info { padding: 20px; }
        .post-title { font-family: 'Cairo', sans-serif; font-size: 19px; margin: 0; color: #fff; }
        .read-more { color: var(--primary); font-weight: bold; font-size: 14px; margin-top: 15px; display: block; }

        /* عرض المقال */
        #article-view { display: none; }
        .back-btn { background: var(--primary); color: #000; border: none; padding: 10px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-bottom: 25px; display: inline-flex; align-items: center; gap: 8px; }
        .full-img { width: 100%; border-radius: 15px; margin-bottom: 20px; }
        .full-content { font-size: 18px; line-height: 1.8; color: #ccc; white-space: pre-line; }
    </style>
</head>
<body>

    <header onclick="showHome()">
        <h1 class="logo-text">منصة زين العابدين المحبشي</h1>
        <div class="sub-text">يمن تمكين</div>
    </header>

    <div class="container">
        
        <div class="ad-space">
            إعلان بانر
        </div>

        <div id="posts-container">
            <p style="text-align:center;">جاري تحميل المقالات...</p>
        </div>

        <div id="article-view">
            <button class="back-btn" onclick="showHome()">
                <i class="fas fa-arrow-right"></i> عودة للرئيسية
            </button>
            <h1 id="view-title" style="font-family:'Cairo'; color:var(--primary);"></h1>
            <img id="view-img" class="full-img" src="">
            <div id="view-body" class="full-content"></div>

            <div class="ad-space" style="margin-top:30px;">
                إعلانات مقترحة
            </div>
        </div>

    </div>

    <script>
        let articlesData = [];

        async function loadContent() {
            try {
                // جلب البيانات مع منع التخزين المؤقت لضمان التحديث الفوري
                const response = await fetch('data.json?v=' + Math.random());
                articlesData = await response.json();
                displayList();
            } catch (err) {
                document.getElementById('posts-container').innerHTML = "<p style='text-align:center;'>تأكد من وجود ملف data.json</p>";
            }
        }

        function displayList() {
            const container = document.getElementById('posts-container');
            container.innerHTML = '';
            articlesData.forEach((item, i) => {
                container.innerHTML += `
                    <div class="post-card" onclick="openArticle(${i})">
                        <img src="${item.image}" class="post-img">
                        <div class="post-info">
                            <h2 class="post-title">${item.title}</h2>
                            <span class="read-more">إقرأ المزيد <i class="fas fa-chevron-left"></i></span>
                        </div>
                    </div>`;
            });
        }

        function openArticle(index) {
            document.getElementById('posts-container').style.display = 'none';
            document.getElementById('article-view').style.display = 'block';
            const post = articlesData[index];
            document.getElementById('view-title').innerText = post.title;
            document.getElementById('view-img').src = post.image;
            document.getElementById('view-body').innerText = post.content;
            window.scrollTo(0, 0);
        }

        function showHome() {
            document.getElementById('posts-container').style.display = 'block';
            document.getElementById('article-view').style.display = 'none';
            window.scrollTo(0, 0);
        }

        loadContent();
    </script>
</body>
</html>
